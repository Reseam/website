services:
  reseam-website:
    image: git.reseam.app/reseam/website:latest
    restart: unless-stopped
    networks:
      - pangolin
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pangolin:
    external: true
