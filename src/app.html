<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark" />
		<meta name="theme-color" content="#0a0a0a" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/InterVariable.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" type="image/svg+xml" />
		<meta property="og:site_name" content="Reseam" />
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="en" />
		<meta property="og:image" content="%sveltekit.assets%/og.svg" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="%sveltekit.assets%/og.svg" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
