name: build

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  IMAGE: git.reseam.app/reseam/website

jobs:
  build:
    runs-on: docker
    container:
      image: code.forgejo.org/oci/node:20-bookworm
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: install docker cli
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends ca-certificates curl gnupg
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $codename stable" > /etc/apt/sources.list.d/docker.list
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends docker-ce-cli

      - name: login
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.reseam.app -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: build and push
        run: |
          docker build \
            --build-arg FORGEJO_TOKEN=${{ secrets.FORGEJO_TOKEN }} \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
